<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventPay</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f0f13;color:#f0eff5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{width:100%;max-width:400px;text-align:center}
.logo{font-size:40px;font-weight:700;letter-spacing:-2px;margin-bottom:8px}
.logo span{color:#9d91fa}
.sub{font-size:14px;color:#8b8a99;margin-bottom:52px;line-height:1.6}
.cards{display:grid;gap:12px}
.card{background:#1a1a22;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:22px 24px;cursor:pointer;text-align:left;transition:all .18s;text-decoration:none;color:inherit;display:flex;align-items:center;gap:18px}
.card:hover{border-color:#7c6cf8;background:#22222e;transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,108,248,.15)}
.card:active{transform:scale(.98)}
.ri{font-size:36px;flex-shrink:0}
.rt{font-size:15px;font-weight:600;margin-bottom:4px}
.rd{font-size:12px;color:#8b8a99;line-height:1.4}
.ver{font-size:11px;color:#333;margin-top:44px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Event<span>Pay</span></div>
  <div class="sub">Sistema de punto de venta cashless<br>para eventos y fiestas</div>
  <div class="cards">
    <a class="card" href="cajero.html">
      <div class="ri">🧾</div>
      <div><div class="rt">Cajero · Posnet</div><div class="rd">Catálogo, cobro con MP Point, tickets y devoluciones</div></div>
    </a>
    <a class="card" href="admin.html">
      <div class="ri">📊</div>
      <div><div class="rt">Panel de administración</div><div class="rd">Dashboard en vivo, catálogo, cajeros y reportes</div></div>
    </a>
  </div>
  <div class="ver">EventPay v2.0 · Supabase + Mercado Pago Point Deep Link</div>
</div>
</body>
</html>
